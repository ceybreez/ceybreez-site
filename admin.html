<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CeyBreez Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<div class="admin-wrap">
  <h1>CeyBreez Admin Panel</h1>

  <section class="login-box" id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="adminToken" placeholder="Enter ADMIN_TOKEN" />
    <button onclick="loginAdmin()">Login</button>
  </section>

  <section class="admin-panel hidden" id="adminPanel">
    <div class="topbar">
      <button onclick="showTab('destinations')">Tours Destinations</button>
      <button onclick="showTab('properties')">Villas / Homestays / Apartments</button>
      <button onclick="logoutAdmin()">Logout</button>
    </div>

    <section id="destinationsTab">
      <h2>Tours Destinations</h2>

      <form id="destinationForm">
        <input type="hidden" id="destEditId" />

        <input id="destName" placeholder="Location Name" required />
        <input id="destProvince" placeholder="Province" required />
        <input id="destLat" placeholder="Latitude" required />
        <input id="destLng" placeholder="Longitude" required />
        <input id="destBestFor" placeholder="Best For" />
        <input id="destTime" placeholder="Time Needed" />
        <input id="destNearby" placeholder="Nearby Places" />
        <textarea id="destDescription" placeholder="Description"></textarea>

        <div class="upload-box"
             ondragover="handleDragOver(event)"
             ondragleave="handleDragLeave(event)"
             ondrop="handleDrop(event, 'dest')">
          <h3>Upload Destination Photos</h3>
          <p>Drag & drop photos here, or browse from your computer.</p>
          <input type="file" id="destPhotoUploader" multiple accept="image/*" onchange="uploadPhotos('dest')" />
          <button type="button" onclick="document.getElementById('destPhotoUploader').click()">Browse Photos</button>
          <p id="destUploadStatus" class="upload-status"></p>
        </div>

        <textarea id="destPhotos" placeholder="Photo URLs will appear here automatically, one per line"></textarea>
        <div id="destPhotoPreview" class="photo-preview"></div>

        <label><input type="checkbox" id="destActive" checked /> Active / Show on website</label>

        <button type="submit">Save Destination</button>
        <button type="button" onclick="resetDestinationForm()">Clear</button>
      </form>

      <div id="destinationsList" class="list"></div>
    </section>

    <section id="propertiesTab" class="hidden">
      <h2>Properties</h2>

      <form id="propertyForm">
        <input type="hidden" id="propEditId" />

        <select id="propType">
          <option value="villa">Villa</option>
          <option value="homestay">Homestay</option>
          <option value="apartment">Apartment</option>
        </select>

        <input id="propName" placeholder="Property Name" required />
        <input id="propLocation" placeholder="Location" />
        <input id="propLat" placeholder="Latitude" />
        <input id="propLng" placeholder="Longitude" />
        <input id="propPrice" placeholder="Price / Starting From" />
        <input id="propGuests" placeholder="Guests" />
        <input id="propBedrooms" placeholder="Bedrooms" />
        <input id="propBathrooms" placeholder="Bathrooms" />
        <textarea id="propFacilities" placeholder="Facilities, one per line"></textarea>
        <textarea id="propDescription" placeholder="Description"></textarea>

        <div class="upload-box"
             ondragover="handleDragOver(event)"
             ondragleave="handleDragLeave(event)"
             ondrop="handleDrop(event, 'prop')">
          <h3>Upload Property Photos</h3>
          <p>Drag & drop photos here, or browse from your computer.</p>
          <input type="file" id="propPhotoUploader" multiple accept="image/*" onchange="uploadPhotos('prop')" />
          <button type="button" onclick="document.getElementById('propPhotoUploader').click()">Browse Photos</button>
          <p id="propUploadStatus" class="upload-status"></p>
        </div>

        <textarea id="propPhotos" placeholder="Photo URLs will appear here automatically, one per line"></textarea>
        <div id="propPhotoPreview" class="photo-preview"></div>

        <label><input type="checkbox" id="propActive" checked /> Active / Show on website</label>

        <button type="submit">Save Property</button>
        <button type="button" onclick="resetPropertyForm()">Clear</button>
      </form>

      <div id="propertiesList" class="list"></div>
    </section>
  </section>
</div>

<script src="admin.js"></script>
<div id="imagePreviewModal" class="image-preview-modal">
  <span class="image-preview-close" onclick="closeImagePreview()">×</span>
  <img id="previewFullImage" src="" alt="Preview">
</div>
  
</body>
</html>
