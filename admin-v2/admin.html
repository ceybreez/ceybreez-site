<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CeyBreez Admin V13 Production</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <section id="loginView" class="login-view">
    <div class="login-card">
      <div class="brand-row"><div class="brand-mark">CB</div><div><h1>CeyBreez</h1><p>Admin V13 Production</p></div></div>
      <h2>Admin Login</h2>
      <input id="adminToken" type="password" placeholder="Enter ADMIN_TOKEN" autocomplete="off" />
      <button id="loginBtn" type="button">Login</button>
      <p id="loginError" class="error-text"></p>
    </div>
  </section>

  <section id="appView" class="app-view hidden">
    <aside class="sidebar">
      <div class="brand-row sidebar-brand"><div class="brand-mark">CB</div><div><strong>CeyBreez</strong><small>V13 Production</small></div></div>
      <nav class="nav">
        <button data-module="dashboard" class="active">📊 Dashboard</button>
        <button data-module="inquiries">💬 Inquiry CRM</button>
        <button data-module="bookings">📅 Booking CRM</button>
        <button data-module="availability">🗓 Availability</button>
        <button data-module="properties">🏡 Properties</button>
        <button data-module="tours">🚌 Tours</button>
        <button data-module="services">☕ Services</button>
        <button data-module="reviews">⭐ Reviews</button>
        <button data-module="reports">📈 Reports</button>
        <button data-module="settings">⚙ Settings</button>
      </nav>
      <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="mobileMenuBtn" class="menu-btn" type="button">☰</button>
        <div><h1 id="pageTitle">Dashboard</h1><p id="pageSubtitle">Live operations overview</p></div>
        <div class="top-actions"><input id="globalSearch" placeholder="Search..." /><button id="refreshBtn" type="button">Refresh</button></div>
      </header>
      <div id="toastArea" class="toast-area"></div>

      <section id="dashboardModule" class="module active-module"></section>
      <section id="inquiriesModule" class="module"></section>
      <section id="bookingsModule" class="module"></section>
      <section id="availabilityModule" class="module"></section>
      <section id="propertiesModule" class="module"></section>
      <section id="toursModule" class="module"></section>
      <section id="servicesModule" class="module"></section>
      <section id="reviewsModule" class="module"></section>
      <section id="reportsModule" class="module"></section>
      <section id="settingsModule" class="module"></section>
    </main>
  </section>

  <div id="modalRoot"></div>
  <script src="admin.js"></script>
</body>
</html>
