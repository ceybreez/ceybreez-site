<section id="inquiriesTab" class="hidden">
  <h2 id="inquiryPageTitle">Property Inquiry</h2>
<div class="inquiry-toolbar">

  <input
    type="text"
    id="inquirySearch"
    placeholder="Search reference, name, email..."
  >

  <select id="inquiryFilter">
    <option value="">All Status</option>
    <option value="New">New</option>
    <option value="Contacted">Contacted</option>
    <option value="Quoted">Quoted</option>
    <option value="Booked">Booked</option>
    <option value="Closed">Closed</option>
    <option value="Cancelled">Cancelled</option>
  </select>

  <button onclick="exportInquiriesCSV()">Export CSV</button>

</div>

<div id="inquiryCards" class="dashboard-cards"></div>

<div id="inquiryTypeCards" class="dashboard-cards"></div>

<div id="monthlyInquiryChart" class="monthly-chart"></div>
 <section class="admin-section">
  <div class="section-head">
    <div>
      <h2>Latest Inquiries</h2>
      <p>Manage customer inquiries from one place</p>
    </div>

    <div class="inquiry-tools">
      <input type="text" id="inquirySearch" placeholder="Search name, email, property..." />

      <select id="inquiryStatusFilter">
        <option value="all">All Status</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="booked">Booked</option>
        <option value="quoted">Quoted</option>
        <option value="cancelled">Cancelled</option>
        <option value="closed">Closed</option>
      </select>
    </div>
  </div>

  <div class="table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Guest</th>
          <th>Type</th>
          <th>Property / Tour</th>
          <th>Check-in</th>
          <th>Guests</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="inquiryTableBody">
        <!-- JS render -->
      </tbody>
    </table>
  </div>
</section> 

<div id="inquiryStats" class="inquiry-stats"></div>
  <div id="inquiriesList" class="list"></div>
</section>
