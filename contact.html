<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | CeyBreez</title>

  <link rel="stylesheet" href="contact.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.5.6/build/css/intlTelInput.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="contact-page">

  <div class="contact-container">

    <div class="contact-info">

      <img src="logo.png" alt="CeyBreez Logo" class="contact-logo">

      <h1>Contact CeyBreez</h1>

      <p>
        Plan your Sri Lanka journey with us. Contact us for Villas,
        HomeStays, Apartments, Tours and custom travel experiences.
      </p>

      <div class="info-box">
        <h3>Email</h3>
        <a href="mailto:ceybreez@gmail.com">ceybreez@gmail.com</a>
      </div>

      <div class="info-box">
        <h3>WhatsApp</h3>
        <a href="https://wa.me/94704620017" target="_blank">
          +94 70 462 0017
        </a>
      </div>

    <div class="social-links">

  <a class="social-btn facebook"
     href="https://www.facebook.com/profile.php?id=61589168168800"
     target="_blank">
     f
  </a>

  <a class="social-btn instagram"
     href="https://www.instagram.com/CeyBreez"
     target="_blank">
     ◎
  </a>

  <a class="social-btn whatsapp-icon"
     href="https://wa.me/94704620017"
     target="_blank">
     ☎
  </a>

</div>

  <div class="contact-form-box">

      <h2>Send an Inquiry</h2>

      <form id="contactForm">

        <label>*Your Name</label>
        <input type="text" id="name" placeholder="Your Name" required>

        <label>*Country</label>
        <select id="country" required>
          <option value="">Select your country</option>
        </select>

        <label>*Mobile Number</label>
        <input type="tel" id="mobile" placeholder="Mobile Number" required>

        <label>*Email ID</label>
        <input type="email" id="email" placeholder="Email ID" required>

        <label>*Type of Experience</label>
        <div class="checkbox-group">
          <label><input type="checkbox" value="Villas"> Villas</label>
          <label><input type="checkbox" value="HomeStays"> HomeStays</label>
          <label><input type="checkbox" value="Apartments"> Apartments</label>
          <label><input type="checkbox" value="Tours"> Tours</label>
        </div>

        <label>*Expecting Dates</label>
        <div class="date-row">
          <input type="date" id="dateFrom" required>
          <input type="date" id="dateTo" required>
        </div>

        <label>*Number of Guests</label>
        <input type="number" id="guests" placeholder="Number of Guests" min="1" required>

        <label>Your Message</label>
        <textarea id="message" placeholder="Tell us about your trip..." rows="5"></textarea>

        <button type="button" onclick="sendInquiry()">Send Inquiry</button>

      </form>

    </div>

  </div>

</section>

<footer>
  <p>© 2026 CeyBreez. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.5.6/build/js/intlTelInput.min.js"></script>

<script>

  const phoneInput = document.querySelector("#mobile");
  const countryInput = document.querySelector("#country");

  const iti = window.intlTelInput(phoneInput, {
    initialCountry: "lk",
    separateDialCode: true,
    preferredCountries: ["lk", "om", "in", "ae", "qa", "sa", "gb", "us"],
    utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.5.6/build/js/utils.js"
  });

  const countryData = window.intlTelInputGlobals.getCountryData();

  countryData.forEach(country => {
    const option = document.createElement("option");
    option.value = country.name;
    option.textContent = country.name;
    countryInput.appendChild(option);
  });
countryInput.addEventListener("change", function(){

  const selectedCountry = countryInput.value;

  const matchedCountry = countryData.find(
    country => country.name === selectedCountry
  );

  if(matchedCountry){

    iti.setCountry(matchedCountry.iso2);

  }

});
  async function sendInquiry(){

    const name = document.getElementById("name").value;
    const country = document.getElementById("country").value;
    const mobile = phoneInput.value;
    const email = document.getElementById("email").value;
    const dateFrom = document.getElementById("dateFrom").value;
    const dateTo = document.getElementById("dateTo").value;
    const guests = document.getElementById("guests").value;
    const message = document.getElementById("message").value;

    const selectedCountry = iti.getSelectedCountryData();
    const countryCode = "+" + selectedCountry.dialCode;
    const fullMobile = iti.getNumber();

    const experiences = Array.from(
      document.querySelectorAll('.checkbox-group input:checked')
    ).map(item => item.value).join(", ");

    if(!name || !country || !mobile || !email || !dateFrom || !dateTo || !guests || !experiences){
      alert("Please fill all required fields.");
      return;
    }

    const inquiryData = {
      name,
      country,
      mobile: fullMobile,
      email,
      countryCode,
      experiences,
      dateFrom,
      dateTo,
      guests,
      message
    };

    const whatsappText =
`Hello CeyBreez!

New Travel Inquiry

Name: ${name}
Country: ${country}
Mobile: ${fullMobile}
Email: ${email}

Type of Experience:
${experiences}

Expecting Dates:
${dateFrom} to ${dateTo}

Guests:
${guests}

Message:
${message}`;

    const whatsappURL =
      "https://wa.me/94704620017?text=" +
      encodeURIComponent(whatsappText);

    window.open(whatsappURL, "_blank");

    try{

      const response = await fetch(
        "https://ceybreez-contact-api.ceybreez.workers.dev",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(inquiryData)
        }
      );

      if(response.ok){
        alert("Inquiry sent successfully!");
        document.getElementById("contactForm").reset();
        iti.setCountry("lk");
        countryInput.value = "";
      }else{
        alert("WhatsApp opened, but email sending failed.");
      }

    }catch(error){
      alert("WhatsApp opened, but email sending failed.");
      console.log(error);
    }

  }

</script>

</body>
</html>
